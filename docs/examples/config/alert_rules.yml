# 分布式锁告警规则配置

groups:
  # 系统级别告警
  - name: distributed_lock_system
    rules:
      # 应用不可用
      - alert: ApplicationDown
        expr: up{job="distributed-lock-app"} == 0
        for: 1m
        labels:
          severity: critical
          category: system
        annotations:
          summary: "分布式锁应用已宕机"
          description: "应用实例 {{ $labels.instance }} 已停止运行超过 1 分钟"
          impact: "分布式锁服务不可用，可能导致业务操作失败"
          action: "检查应用日志，查看是否有异常；重启应用实例"

      # JVM 内存不足
      - alert: JvmMemoryLow
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.9
        for: 5m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "JVM 堆内存使用率过高"
          description: "JVM 堆内存使用率达到 {{ $value }}% (实例: {{ $labels.instance }})"
          impact: "可能导致 GC 频繁，影响应用性能"
          action: "增加 JVM 堆内存大小，或优化内存使用"

      # CPU 使用率过高
      - alert: HighCpuUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "CPU 使用率过高"
          description: "CPU 使用率超过 80% (实例: {{ $labels.instance }})"
          impact: "应用响应变慢，可能影响用户体验"
          action: "检查是否有性能问题，考虑增加 CPU 资源或优化代码"

  # 锁操作级别告警
  - name: distributed_lock_operations
    rules:
      # 锁获取失败率高
      - alert: HighLockAcquisitionFailureRate
        expr: rate(distributed_lock_operations_total{operation="acquire", result="failure"}[5m]) / rate(distributed_lock_operations_total{operation="acquire"}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          category: performance
        annotations:
          summary: "锁获取失败率过高"
          description: "锁获取失败率达到 {{ $value }}% (阈值: 10%)"
          impact: "业务操作可能失败，影响用户体验"
          action: "检查锁竞争情况，后端存储状态，或增加重试次数"

      # 锁获取时间过长
      - alert: SlowLockAcquisition
        expr: histogram_quantile(0.95, rate(distributed_lock_acquisition_duration_seconds_bucket[5m])) > 2.0
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "锁获取响应时间过长"
          description: "95th 百分位锁获取时间超过 2 秒 (当前: {{ $value }}s)"
          impact: "业务操作延迟增加"
          action: "检查网络延迟，后端性能，或减少锁竞争"

      # 锁竞争激烈
      - alert: HighLockContention
        expr: distributed_lock_contention_rate > 0.8
        for: 10m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "锁竞争率过高"
          description: "锁竞争率达到 {{ $value }} (阈值: 0.8)"
          impact: "多个线程/进程竞争同一锁，影响并发性能"
          action: "检查锁使用模式，考虑优化锁粒度或使用读写锁"

      # 死锁检测
      - alert: DeadlockDetected
        expr: increase(distributed_lock_deadlocks_detected_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          category: business
        annotations:
          summary: "检测到死锁"
          description: "在过去 5 分钟内检测到 {{ $value }} 个死锁"
          impact: "业务操作被阻塞，可能导致系统不可用"
          action: "检查应用日志中的死锁信息，重启受影响的服务"

  # 连接池级别告警
  - name: distributed_lock_connections
    rules:
      # 连接池耗尽
      - alert: ConnectionPoolExhausted
        expr: distributed_lock_connection_pool_waiting > 20
        for: 2m
        labels:
          severity: critical
          category: system
        annotations:
          summary: "连接池已耗尽"
          description: "{{ $value }} 个线程正在等待数据库连接"
          impact: "新请求无法获取连接，服务不可用"
          action: "增加连接池大小，检查连接泄漏，或增加后端容量"

      # 连接池使用率高
      - alert: HighConnectionPoolUsage
        expr: distributed_lock_connection_pool_active / distributed_lock_connection_pool_max_total > 0.9
        for: 5m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "连接池使用率过高"
          description: "连接池使用率达到 {{ $value }}% (阈值: 90%)"
          impact: "连接池即将耗尽，风险较高"
          action: "监控连接使用情况，考虑增加连接池大小"

      # 连接超时
      - alert: ConnectionTimeouts
        expr: rate(distributed_lock_connection_timeouts_total[5m]) > 5
        for: 2m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "连接超时事件增加"
          description: "过去 5 分钟内发生 {{ $value }} 次连接超时"
          impact: "操作失败率增加"
          action: "检查网络连接，后端可用性，或增加超时时间"

  # 业务影响级别告警
  - name: distributed_lock_business
    rules:
      # 业务操作失败率高
      - alert: HighBusinessFailureRate
        expr: rate(business_operation_failure_total[5m]) / rate(business_operation_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          category: business
        annotations:
          summary: "业务操作失败率过高"
          description: "业务操作失败率达到 {{ $value }}% (阈值: 5%)"
          impact: "用户体验受到影响，业务目标无法达成"
          action: "检查应用日志，数据库连接，锁操作等系统组件"

      # 订单处理延迟
      - alert: OrderProcessingDelay
        expr: histogram_quantile(0.95, rate(order_processing_duration_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
          category: business
        annotations:
          summary: "订单处理延迟增加"
          description: "95th 百分位订单处理时间超过 30 秒 (当前: {{ $value }}s)"
          impact: "用户等待时间过长"
          action: "检查锁竞争，数据库性能，或应用处理逻辑"

      # 库存不一致
      - alert: InventoryInconsistency
        expr: abs(inventory_calculated_total - inventory_actual_total) > 10
        for: 1m
        labels:
          severity: critical
          category: business
        annotations:
          summary: "库存数据不一致"
          description: "库存数据偏差超过 10 个单位"
          impact: "可能导致超卖或缺货，影响业务准确性"
          action: "检查并发修改逻辑，锁使用是否正确"

  # 容量和扩容告警
  - name: distributed_lock_capacity
    rules:
      # 活跃锁数量接近上限
      - alert: ApproachingLockCapacityLimit
        expr: distributed_lock_active_count / distributed_lock_max_locks > 0.8
        for: 10m
        labels:
          severity: warning
          category: capacity
        annotations:
          summary: "活跃锁数量接近上限"
          description: "活跃锁数量达到容量的 {{ $value }}% (阈值: 80%)"
          impact: "可能影响新锁的创建"
          action: "考虑增加最大锁数量限制，或优化锁使用模式"

      # 扩容效率低下
      - alert: ScalingIneffective
        expr: rate(distributed_lock_operations_total[5m]) / kube_deployment_spec_replicas{deployment="distributed-lock-app"} < 100
        for: 10m
        labels:
          severity: warning
          category: capacity
        annotations:
          summary: "扩容效果不佳"
          description: "每个副本的平均操作率低于 100 ops/sec"
          impact: "扩容没有带来预期性能提升"
          action: "检查是否存在瓶颈，考虑垂直扩容或代码优化"

      # 资源过度配置
      - alert: OverProvisioned
        expr: rate(container_cpu_usage_seconds_total[5m]) / rate(container_spec_cpu_period[5m]) < 0.3 and container_memory_usage_bytes / container_spec_memory_limit_bytes < 0.5
        for: 30m
        labels:
          severity: info
          category: capacity
        annotations:
          summary: "资源过度配置"
          description: "CPU 和内存使用率均较低，可以考虑缩容"
          impact: "资源浪费，增加运营成本"
          action: "评估是否可以减少副本数量或降低资源配置"

  # 备份和恢复告警
  - name: distributed_lock_backup
    rules:
      # 备份失败
      - alert: BackupFailure
        expr: rate(backup_operations_total{result="failure"}[1h]) > 0
        labels:
          severity: critical
          category: backup
        annotations:
          summary: "备份操作失败"
          description: "备份操作在过去 1 小时内失败"
          impact: "数据可能无法恢复"
          action: "检查备份脚本，存储空间，网络连接"

      # 备份过旧
      - alert: BackupTooOld
        expr: time() - backup_last_success_timestamp > 86400
        labels:
          severity: warning
          category: backup
        annotations:
          summary: "备份数据过旧"
          description: "最后一次成功备份距今已超过 24 小时"
          impact: "数据丢失风险增加"
          action: "检查备份任务状态，修复备份流程"