# 分布式锁 Spring Boot 配置示例

spring:
  application:
    name: distributed-lock-demo

  profiles:
    active: development

# 分布式锁配置
distributed-lock:
  # 后端类型：redis 或 zookeeper
  backend: redis

  # Redis 配置
  redis:
    # 单节点模式
    hosts: localhost:6379
    password: ${REDIS_PASSWORD:}
    database: 0
    client-name: distributed-lock-client

    # 集群模式 (当使用集群时取消注释)
    # cluster:
    #   nodes:
    #     - redis://localhost:6379
    #     - redis://localhost:6380
    #     - redis://localhost:6381
    #   password: ${REDIS_PASSWORD:}

    # 连接池配置
    pool:
      max-total: 20         # 最大连接数
      max-idle: 10          # 最大空闲连接
      min-idle: 2           # 最小空闲连接
      max-wait-millis: 5000 # 最大等待时间
      test-on-borrow: true  # 借用时测试连接
      test-on-return: true  # 归还时测试连接
      test-while-idle: true # 空闲时测试连接

  # ZooKeeper 配置 (当使用 ZooKeeper 时取消注释)
  # zookeeper:
  #   connect-string: localhost:2181
  #   base-path: /distributed-locks
  #   session-timeout: 60s
  #   connection-timeout: 15s
  #   auth-enabled: false
  #   acl-enabled: false

  # 监控配置
  monitoring:
    enabled: true

  # 指标收集配置
  metrics:
    enabled: true

  # 看门狗配置
  watchdog:
    enabled: true
    renewal-interval: 10s

  # 默认配置
  default-lease-time: 30s
  default-wait-time: 10s

  # 重试配置
  retry-interval: 100ms
  max-retries: 3

# Spring Boot Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,configprops,env
      base-path: /actuator

  endpoint:
    health:
      show-details: when-authorized
    metrics:
      enabled: true
    prometheus:
      enabled: true

  health:
    distributed-lock:
      enabled: true

  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      instance: ${spring.application.instance_id:${random.value}}

# 日志配置
logging:
  level:
    com.mycorp.distributedlock: INFO
    com.mycorp.distributedlock.audit: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

  file:
    name: logs/distributed-lock-app.log
    max-size: 100MB
    max-history: 30

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /

  # 优雅关闭
  shutdown: graceful

# 数据库配置 (如果需要)
# spring:
#   datasource:
#     url: jdbc:h2:mem:testdb
#     driver-class-name: org.h2.Driver
#     username: sa
#     password:

#   jpa:
#     hibernate:
#       ddl-auto: create-drop
#     show-sql: true

---
# 生产环境配置
spring:
  config:
    activate:
      on-profile: production

distributed-lock:
  redis:
    hosts: ${REDIS_HOST:redis-cluster:6379}
    password: ${REDIS_PASSWORD}
    pool:
      max-total: 50
      max-idle: 20
      min-idle: 5

  monitoring:
    enabled: true
  metrics:
    enabled: true
  watchdog:
    enabled: true

logging:
  level:
    com.mycorp.distributedlock: WARN
    root: INFO

---
# 测试环境配置
spring:
  config:
    activate:
      on-profile: test

distributed-lock:
  redis:
    hosts: localhost:6379
    password: test-password
  monitoring:
    enabled: false
  metrics:
    enabled: false

logging:
  level:
    com.mycorp.distributedlock: DEBUG

---
# Docker 环境配置
spring:
  config:
    activate:
      on-profile: docker

distributed-lock:
  redis:
    hosts: redis:6379
    password: ${REDIS_PASSWORD}

server:
  port: 8080

---
# Kubernetes 环境配置
spring:
  config:
    activate:
      on-profile: kubernetes

distributed-lock:
  redis:
    cluster:
      nodes:
        - redis://redis-cluster:6379
        - redis://redis-cluster:6380
        - redis://redis-cluster:6381
      password: ${REDIS_PASSWORD}

management:
  endpoint:
    health:
      probes:
        enabled: true

server:
  shutdown: graceful