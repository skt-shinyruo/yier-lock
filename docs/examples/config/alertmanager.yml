# AlertManager 告警管理配置

global:
  # SMTP 配置
  smtp_smarthost: 'smtp.company.com:587'
  smtp_from: 'alerts@company.com'
  smtp_auth_username: 'alerts@company.com'
  smtp_auth_password: 'your-smtp-password'

  # Slack 配置
  slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

  # 其他全局配置
  resolve_timeout: 5m

# 路由配置
route:
  # 默认路由
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']

  # 路由规则
  routes:
    # 严重告警 - 立即通知
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true

    # 不同团队的告警路由
    - match:
        team: backend
      receiver: 'backend-team'
    - match:
        team: devops
      receiver: 'devops-team'
    - match:
        team: frontend
      receiver: 'frontend-team'

    # 不同集群的告警路由
    - match:
        cluster: production
      receiver: 'production-alerts'
    - match:
        cluster: staging
      receiver: 'staging-alerts'

  # 分组配置
  group_wait: 30s      # 等待组内其他告警的时间
  group_interval: 5m   # 组间发送间隔
  repeat_interval: 4h  # 重复告警间隔

# 抑制规则
inhibit_rules:
  # 如果应用宕机，抑制所有相关告警
  - source_match:
      alertname: ApplicationDown
    target_match:
      instance: '{{ $labels.instance }}'
    equal: ['instance']

  # 如果节点不可用，抑制该节点的所有告警
  - source_match:
      alertname: NodeDown
    target_match_re:
      instance: '{{ $labels.instance }}:.+'
    equal: ['instance']

  # 维护期间抑制告警
  - source_match:
      alertname: MaintenanceMode
    target_match:
      region: '{{ $labels.region }}'
    equal: ['region']

# 接收器配置
receivers:
  # 默认接收器
  - name: 'default'
    slack_configs:
      - channel: '#alerts'
        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Instance:* {{ .Labels.instance }}
          *Time:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ if .Annotations.action }}*Action:* {{ .Annotations.action }}{{ end }}
          {{ if .Annotations.impact }}*Impact:* {{ .Annotations.impact }}{{ end }}
          {{ end }}
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        send_resolved: true

  # 严重告警接收器
  - name: 'critical-alerts'
    slack_configs:
      - channel: '#critical-alerts'
        title: '🚨 CRITICAL ALERT: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *🚨 CRITICAL ALERT 🚨*
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Instance:* {{ .Labels.instance }}
          *Time:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ if .Annotations.action }}*Action Required:* {{ .Annotations.action }}{{ end }}
          {{ if .Annotations.impact }}*Business Impact:* {{ .Annotations.impact }}{{ end }}
          {{ end }}
        color: 'danger'
        send_resolved: true
    pagerduty_configs:
      - service_key: 'your-pagerduty-integration-key'
        description: '{{ .GroupLabels.alertname }}'
        details:
          severity: '{{ .Labels.severity }}'
          instance: '{{ .Labels.instance }}'
          description: '{{ .Annotations.description }}'
        send_resolved: true

  # 团队专用接收器
  - name: 'backend-team'
    email_configs:
      - to: 'backend-team@company.com'
        subject: '[Backend Alert] {{ .GroupLabels.alertname }}'
        headers:
          From: 'AlertManager <alerts@company.com>'
          To: 'backend-team@company.com'
        html: |
          <h2>{{ .GroupLabels.alertname }}</h2>
          <table border="1" style="border-collapse: collapse;">
          {{ range .Alerts }}
          <tr style="background-color: {{ if eq .Status "firing" }}#ffcccc{{ else }}#ccffcc{{ end }};">
            <td><b>Severity</b></td>
            <td>{{ .Labels.severity }}</td>
          </tr>
          <tr>
            <td><b>Summary</b></td>
            <td>{{ .Annotations.summary }}</td>
          </tr>
          <tr>
            <td><b>Description</b></td>
            <td>{{ .Annotations.description }}</td>
          </tr>
          <tr>
            <td><b>Instance</b></td>
            <td>{{ .Labels.instance }}</td>
          </tr>
          <tr>
            <td><b>Time</b></td>
            <td>{{ .StartsAt.Format "2006-01-02 15:04:05" }}</td>
          </tr>
          {{ if .Annotations.action }}
          <tr>
            <td><b>Action Required</b></td>
            <td>{{ .Annotations.action }}</td>
          </tr>
          {{ end }}
          {{ if .Annotations.impact }}
          <tr>
            <td><b>Business Impact</b></td>
            <td>{{ .Annotations.impact }}</td>
          </tr>
          {{ end }}
          {{ end }}
          </table>
        send_resolved: true

  - name: 'devops-team'
    slack_configs:
      - channel: '#devops-alerts'
        title: '[DevOps] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *DevOps Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Instance:* {{ .Labels.instance }}
          {{ if .Annotations.action }}*Action:* {{ .Annotations.action }}{{ end }}
          {{ end }}
        send_resolved: true

  - name: 'frontend-team'
    email_configs:
      - to: 'frontend-team@company.com'
        subject: '[Frontend Alert] {{ .GroupLabels.alertname }}'

  # 环境专用接收器
  - name: 'production-alerts'
    slack_configs:
      - channel: '#production-alerts'
        title: '[PROD] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *🔴 PRODUCTION ALERT 🔴*
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Instance:* {{ .Labels.instance }}
          {{ if .Annotations.action }}*Action:* {{ .Annotations.action }}{{ end }}
          {{ if .Annotations.impact }}*Impact:* {{ .Annotations.impact }}{{ end }}
          {{ end }}
        color: 'danger'
        send_resolved: true
    pagerduty_configs:
      - service_key: 'prod-pagerduty-key'
        send_resolved: true

  - name: 'staging-alerts'
    slack_configs:
      - channel: '#staging-alerts'
        title: '[STAGING] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *🟡 STAGING ALERT 🟡*
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Instance:* {{ .Labels.instance }}
          {{ end }}
        color: 'warning'
        send_resolved: true

# 模板配置
templates:
  - '/etc/alertmanager/templates/*.tmpl'