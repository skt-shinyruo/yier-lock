# Prometheus 监控配置示例
global:
  scrape_interval: 15s      # 全局抓取间隔
  evaluation_interval: 15s  # 规则评估间隔
  scrape_timeout: 10s       # 抓取超时时间

# 告警规则文件
rule_files:
  - "alert_rules.yml"

# 抓取配置
scrape_configs:
  # 分布式锁应用监控
  - job_name: 'distributed-lock-app'
    static_configs:
      - targets: ['localhost:8080']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    scrape_timeout: 10s

    # 标签配置
    labels:
      service: 'distributed-lock'
      environment: 'production'

    # 重新标记配置
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}'

  # Redis 监控
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:6379']
    metrics_path: '/metrics'

  # ZooKeeper 监控 (如果有)
  - job_name: 'zookeeper'
    static_configs:
      - targets: ['localhost:2181']
    metrics_path: '/metrics'

  # 系统监控
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
    scrape_interval: 30s

# 远程写入配置 (用于长期存储)
remote_write:
  - url: "http://victoriametrics:8428/api/v1/write"
    write_relabel_configs:
      - source_labels: [__name__]
        regex: 'distributed_lock_.*'
        action: keep

# 远程读取配置
remote_read:
  - url: "http://victoriametrics:8428/api/v1/read"
    read_recent: true