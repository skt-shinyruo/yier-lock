distributed-lock {
  # Default lease time for locks (how long a lock is held before automatic expiration)
  default-lease-time = 30s
  
  # Default wait time for lock acquisition attempts
  default-wait-time = 10s
  
  # Retry configuration
  retry-interval = 100ms
  max-retries = 3
  
  # Watchdog configuration for Redis locks
  watchdog {
    enabled = true
    renewal-interval = 10s
  }
  
  # Observability configuration
  metrics {
    enabled = true
  }
  
  tracing {
    enabled = true
  }
  
  # ZooKeeper specific configuration
  zookeeper {
    base-path = "/distributed-locks"
  }
}