# 分布式锁Prometheus告警规则
# 这个文件定义了分布式锁系统的所有告警规则

groups:
  - name: distributed-lock-alerts
    interval: 30s
    rules:
      
      # 错误率告警 - 高错误率告警
      - alert: LockHighErrorRate
        expr: |
          (
            rate(lock_operations_failed_total[5m]) / 
            rate(lock_operations_total[5m]) > 0.05
          ) and on() (increase(lock_operations_total[5m]) > 10)
        for: 2m
        labels:
          severity: warning
          service: distributed-lock
          component: performance
        annotations:
          summary: "分布式锁错误率过高"
          description: |
            分布式锁系统在最近5分钟内错误率超过5%
            当前错误率: {{ $value | humanizePercentage }}
            总操作数: {{ with query "increase(lock_operations_total[5m])" }}{{ . | first | value }}{{ end }}
            失败操作数: {{ with query "increase(lock_operations_failed_total[5m])" }}{{ . | first | value }}{{ end }}
          runbook_url: "https://docs.company.com/runbooks/distributed-lock-high-error-rate"

      # 严重错误率告警
      - alert: LockCriticalErrorRate
        expr: |
          (
            rate(lock_operations_failed_total[5m]) / 
            rate(lock_operations_total[5m]) > 0.10
          ) and on() (increase(lock_operations_total[5m]) > 10)
        for: 1m
        labels:
          severity: critical
          service: distributed-lock
          component: performance
        annotations:
          summary: "分布式锁严重错误率告警"
          description: |
            分布式锁系统在最近5分钟内错误率超过10%
            当前错误率: {{ $value | humanizePercentage }}
            这表明系统可能存在严重问题，需要立即关注
          runbook_url: "https://docs.company.com/runbooks/distributed-lock-critical-error-rate"

      # 响应时间告警 - 高延迟告警
      - alert: LockHighResponseTime
        expr: |
          (
            lock_operation_duration_seconds{quantile="0.95"} > 1
          ) and on() (increase(lock_operations_total[5m]) > 10)
        for: 1m
        labels:
          severity: warning
          service: distributed-lock
          component: performance
        annotations:
          summary: "分布式锁响应时间过长"
          description: |
            分布式锁操作95分位响应时间超过1秒
            当前响应时间: {{ $value }}秒
            可能的原因包括网络延迟、锁竞争激烈或后端性能问题
          runbook_url: "https://docs.company.com/runbooks/distributed-lock-high-response-time"

      # 严重响应时间告警
      - alert: LockCriticalResponseTime
        expr: |
          (
            lock_operation_duration_seconds{quantile="0.95"} > 5
          ) and on() (increase(lock_operations_total[5m]) > 10)
        for: 30s
        labels:
          severity: critical
          service: distributed-lock
          component: performance
        annotations:
          summary: "分布式锁严重响应时间告警"
          description: |
            分布式锁操作95分位响应时间超过5秒
            当前响应时间: {{ $value }}秒
            这可能表明系统负载过重或存在性能瓶颈
          runbook_url: "https://docs.company.com/runbooks/distributed-lock-critical-response-time"

      # 并发数告警 - 高并发告警
      - alert: LockHighConcurrency
        expr: |
          lock_concurrency_current > 100
        for: 5m
        labels:
          severity: warning
          service: distributed-lock
          component: scalability
        annotations:
          summary: "分布式锁并发数过高"
          description: |
            分布式锁系统当前并发数超过100
            当前并发数: {{ $value }}
            高并发可能影响系统性能和响应时间
          runbook_url: "https://docs.company.com/runbooks/distributed-lock-high-concurrency"

      # 严重并发数告警
      - alert: LockCriticalConcurrency
        expr: |
          lock_concurrency_current > 500
        for: 2m
        labels:
          severity: critical
          service: distributed-lock
          component: scalability
        annotations:
          summary: "分布式锁严重并发数告警"
          description: |
            分布式锁系统当前并发数超过500
            当前并发数: {{ $value }}
            极高的并发数可能导致系统资源耗尽
          runbook_url: "https://docs.company.com/runbooks/distributed-lock-critical-concurrency"

      # 系统健康状态告警 - 系统不健康
      - alert: LockSystemUnhealthy
        expr: |
          lock_health_overall_status < 1
        for: 0m
        labels:
          severity: critical
          service: distributed-lock
          component: health
        annotations:
          summary: "分布式锁系统不健康"
          description: |
            分布式锁系统健康状态为不健康
            当前健康状态: {{ $value }}
            需要立即检查系统组件状态
          runbook_url: "https://docs.company.com/runbooks/distributed-lock-system-unhealthy"

      # 吞吐量告警 - 低吞吐量
      - alert: LockLowThroughput
        expr: |
          (
            rate(lock_operations_total[10m]) < 1
          ) and on() (time() - prometheus_rule_evaluation_last_success_time_seconds > 300)
        for: 10m
        labels:
          severity: info
          service: distributed-lock
          component: performance
        annotations:
          summary: "分布式锁系统吞吐量过低"
          description: |
            分布式锁系统在过去10分钟内平均吞吐量低于1 ops/sec
            当前吞吐量: {{ $value }} ops/sec
            这可能表明系统负载较低或存在性能问题
          runbook_url: "https://docs.company.com/runbooks/distributed-lock-low-throughput"

      # 锁竞争率告警
      - alert: LockHighContentionRate
        expr: |
          (
            lock_contention_events_total / lock_acquisition_attempts_total > 0.2
          ) and on() (increase(lock_acquisition_attempts_total[5m]) > 100)
        for: 3m
        labels:
          severity: warning
          service: distributed-lock
          component: performance
        annotations:
          summary: "分布式锁竞争率过高"
          description: |
            分布式锁竞争率超过20%
            当前竞争率: {{ $value | humanizePercentage }}
            高竞争率可能导致锁等待时间增加和系统性能下降
          runbook_url: "https://docs.company.com/runbooks/distributed-lock-high-contention"

      # 告警服务异常告警
      - alert: LockAlertingServiceDown
        expr: |
          up{job="distributed-lock-alerts"} == 0
        for: 5m
        labels:
          severity: critical
          service: distributed-lock
          component: alerting
        annotations:
          summary: "分布式锁告警服务不可用"
          description: |
            分布式锁告警服务在最近5分钟内没有响应
            告警功能可能受到影响，无法及时通知运维团队
          runbook_url: "https://docs.company.com/runbooks/distributed-lock-alerting-down"

      # JMX服务异常告警
      - alert: LockJmxServiceDown
        expr: |
          up{job="distributed-lock-jmx"} == 0
        for: 5m
        labels:
          severity: warning
          service: distributed-lock
          component: jmx
        annotations:
          summary: "分布式锁JMX服务不可用"
          description: |
            分布式锁JMX服务在最近5分钟内没有响应
            JMX监控和管理功能可能受到影响
          runbook_url: "https://docs.company.com/runbooks/distributed-lock-jmx-down"

      # 内存使用率告警
      - alert: LockHighMemoryUsage
        expr: |
          (
            (process_resident_memory_bytes / 1024 / 1024) / 1024 > 0.8
          ) and on() (process_resident_memory_bytes > 104857600)
        for: 5m
        labels:
          severity: warning
          service: distributed-lock
          component: resources
        annotations:
          summary: "分布式锁进程内存使用率过高"
          description: |
            分布式锁进程内存使用率超过80%
            当前内存使用: {{ $value | humanizePercentage }}
            建议检查内存泄漏或增加系统资源
          runbook_url: "https://docs.company.com/runbooks/distributed-lock-high-memory-usage"

      # 监控服务异常告警
      - alert: LockMonitoringServiceDown
        expr: |
          up{job="distributed-lock-monitoring"} == 0
        for: 10m
        labels:
          severity: warning
          service: distributed-lock
          component: monitoring
        annotations:
          summary: "分布式锁监控服务不可用"
          description: |
            分布式锁监控服务在最近10分钟内没有响应
            监控和指标收集功能可能受到影响
          runbook_url: "https://docs.company.com/runbooks/distributed-lock-monitoring-down"

  # 业务告警组
  - name: distributed-lock-business-alerts
    interval: 60s
    rules:
      
      # 关键业务锁告警
      - alert: LockCriticalBusinessOperationFailure
        expr: |
          (
            increase(lock_operations_failed_total{lock_name=~"critical.*"}[5m]) / 
            increase(lock_operations_total{lock_name=~"critical.*"}[5m]) > 0.01
          ) and on() (increase(lock_operations_total{lock_name=~"critical.*"}[5m]) > 50)
        for: 1m
        labels:
          severity: critical
          service: distributed-lock
          component: business
          business_critical: "true"
        annotations:
          summary: "关键业务锁操作失败率过高"
          description: |
            关键业务锁操作在过去5分钟内失败率超过1%
            失败的锁名称: {{ $labels.lock_name }}
            当前失败率: {{ $value | humanizePercentage }}
            这可能影响关键业务流程，需要立即处理
          runbook_url: "https://docs.company.com/runbooks/critical-business-lock-failure"

      # 长时间持有锁告警
      - alert: LockLongHoldTime
        expr: |
          lock_hold_time_seconds > 300
        for: 0m
        labels:
          severity: warning
          service: distributed-lock
          component: business
        annotations:
          summary: "分布式锁持有时间过长"
          description: |
            分布式锁被持有超过5分钟
            锁名称: {{ $labels.lock_name }}
            持有时间: {{ $value }}秒
            长时间持有锁可能导致其他操作阻塞
          runbook_url: "https://docs.company.com/runbooks/distributed-lock-long-hold-time"

  # 基础设施告警组  
  - name: distributed-lock-infrastructure-alerts
    interval: 30s
    rules:
      
      # Redis连接告警
      - alert: LockRedisConnectionFailure
        expr: |
          redis_connected == 0
        for: 30s
        labels:
          severity: critical
          service: distributed-lock
          component: infrastructure
        annotations:
          summary: "分布式锁Redis连接失败"
          description: |
            无法连接到Redis后端服务
            Redis实例: {{ $labels.instance }}
            锁操作将无法正常执行
          runbook_url: "https://docs.company.com/runbooks/distributed-lock-redis-connection-failure"

      # ZooKeeper连接告警
      - alert: LockZookeeperConnectionFailure
        expr: |
          zookeeper_connected == 0
        for: 30s
        labels:
          severity: critical
          service: distributed-lock
          component: infrastructure
        annotations:
          summary: "分布式锁ZooKeeper连接失败"
          description: |
            无法连接到ZooKeeper后端服务
            ZooKeeper实例: {{ $labels.instance }}
            锁操作将无法正常执行
          runbook_url: "https://docs.company.com/runbooks/distributed-lock-zookeeper-connection-failure"

      # 数据库连接告警
      - alert: LockDatabaseConnectionFailure
        expr: |
          database_connected == 0
        for: 60s
        labels:
          severity: critical
          service: distributed-lock
          component: infrastructure
        annotations:
          summary: "分布式锁数据库连接失败"
          description: |
            无法连接到数据库后端服务
            数据库实例: {{ $labels.instance }}
            某些锁操作可能无法执行
          runbook_url: "https://docs.company.com/runbooks/distributed-lock-database-connection-failure"