# Redis分布式锁配置示例

server:
  port: 8080

spring:
  application:
    name: distributed-lock-redis-demo
  
  # 分布式锁配置
  distributed-lock:
    enabled: true
    
    # 使用Redis作为分布式锁后端
    type: redis
    
    # 全局配置
    default-lease-time: 30s       # 默认租约时间30秒
    default-wait-time: 10s        # 默认等待时间10秒
    retry-interval: 100ms         # 重试间隔100毫秒
    max-retries: 3                # 最大重试次数3次
    
    # 看门狗配置
    watchdog-enabled: true        # 启用看门狗续约
    watchdog-renewal-interval: 10s # 每10秒续约一次
    
    # 监控配置
    metrics-enabled: true         # 启用指标收集
    tracing-enabled: true         # 启用分布式追踪
    
    # AOP配置
    aop:
      enabled: true               # 启用AOP切面
      performance-monitoring: true # 启用性能监控
      exception-handling: true    # 启用异常处理
    
    # Redis特定配置
    redis:
      hosts: "redis-cluster:6379,redis-replica1:6379,redis-replica2:6379"  # 集群配置
      
      # 认证配置
      password: "${REDIS_PASSWORD:}"  # 从环境变量读取密码
      
      # SSL配置
      ssl: true                   # 生产环境建议启用SSL
      
      # TLS证书配置
      trust-store-path: "/path/to/truststore.p12"
      trust-store-password: "${REDIS_TRUSTSTORE_PASSWORD:}"
      key-store-path: "/path/to/keystore.p12"
      key-store-password: "${REDIS_KEYSTORE_PASSWORD:}"
      
      # 连接池配置 - 针对高并发场景优化
      pool:
        max-total: 50             # 最大连接数：50 (高并发场景)
        max-idle: 20              # 最大空闲连接：20
        min-idle: 5               # 最小空闲连接：5
        max-wait: 30s             # 最大等待时间：30秒
  
  # Spring Cloud配置
  cloud:
    # 如果使用Spring Cloud
    zookeeper:
      enabled: false               # 不使用ZooKeeper

# Actuator监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,distributed-lock,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
  metrics:
    distribution:
      percentiles-histogram:
        distributed.lock: true    # 分布式锁指标直方图

# 生产环境日志配置
logging:
  level:
    com.mycorp.distributedlock: INFO
    org.springframework.data.redis: WARN
    org.apache.commons.pool2: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/distributed-lock-app.log
    max-size: 100MB
    max-history: 30

# 应用信息
info:
  app:
    name: "Distributed Lock Redis Demo"
    description: "Redis分布式锁示例应用"
    version: "1.0.0"
    backend: "Redis"
    connectivity: "Cluster with SSL"