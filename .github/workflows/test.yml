name: Test

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Maven Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify Docker
        run: docker info

      - name: Run Maven tests
        run: mvn -q test

      - name: Compile benchmarks
        run: mvn -q -Pbenchmarks -DskipTests compile
